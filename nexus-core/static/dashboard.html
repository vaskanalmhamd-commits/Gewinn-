<!DOCTYPE html>
<html>
<head>
<title>Gewinn Reality Engine Dashboard</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1400px; margin: 0 auto; padding: 20px; background-color: #f0f2f5; }
    .nav-bar { background-color: #1c1e21; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .nav-bar a { color: #fff; text-decoration: none; font-weight: bold; margin-right: 20px; }
    h1 { color: #1c1e21; margin-bottom: 30px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #ddd; display: flex; flex-direction: column; }
    .card h2 { margin-top: 0; color: #333; display: flex; align-items: center; gap: 10px; font-size: 1.2em; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    .status-online { background-color: #e6f4ea; color: #1e8e3e; }
    .status-offline { background-color: #fce8e6; color: #d93025; }
    .balance-section { margin: 15px 0; padding: 15px; background: #f8f9fa; border-radius: 8px; text-align: center; }
    .balance-value { font-size: 28px; font-weight: bold; color: #007bff; }
    .balance-label { font-size: 12px; color: #666; margin-top: 5px; }
    .actions-section { margin-top: auto; padding-top: 15px; border-top: 1px solid #eee; }
    .btn { display: inline-block; padding: 8px 15px; background: #007bff; color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px; width: 100%; text-align: center; box-sizing: border-box; cursor: pointer; border: none; }
    .btn:hover { background: #0056b3; }
    .wallet-card { grid-column: 1 / -1; border-top-color: #007bff; display: flex; flex-direction: row; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<div class="nav-bar">
    <div class="brand"><a href="/">🎯 Gewinn Reality Engine</a></div>
    <div class="links">
        <a href="/dashboard">Dashboard</a>
        <a href="/withdraw">Withdrawal</a>
    </div>
</div>

<div class="card wallet-card">
    <div>
        <h2 style="margin:0">💰 Main Wallet Balance</h2>
        <p style="color:#666; font-size:0.9em; margin:5px 0">Aggregated Earnings from All Sources</p>
    </div>
    <div style="text-align: right;">
        <div class="balance-value" id="mainWalletBalance">$0.00</div>
        <a href="/withdraw" class="btn" style="width: auto; padding: 8px 25px; margin-top: 10px;">Withdraw Funds</a>
    </div>
</div>

<h1>📊 DePIN Monitoring & Real-World Tasks</h1>

<div class="dashboard-grid" id="depinGrid">
    <!-- Dynamic Cards Will Appear Here -->
</div>

<script>
async function updateDashboard() {
    try {
        // Wallet Balance
        const walletRes = await fetch('/api/wallet/balance');
        const walletData = await walletRes.json();
        document.getElementById('mainWalletBalance').textContent = `$${walletData.balance.toFixed(4)}`;

        // DePIN Status
        const depinRes = await fetch('/api/depin/status');
        const depinData = await depinRes.json();

        console.log("DePIN Data:", depinData);
        const grid = document.getElementById('depinGrid');
        grid.innerHTML = '';

        const networks = Object.entries(depinData);
        if (networks.length === 0) {
            grid.innerHTML = '<p style="padding: 20px;">Waiting for worker data synchronization...</p>';
        }

        for (const [net, data] of networks) {
            const statusClass = (data.status && (data.status.toLowerCase().includes('connected') || data.status.toLowerCase().includes('active'))) ? 'status-online' : 'status-offline';
            grid.innerHTML += `
                <div class="card">
                    <h2>${net} <span class="status-badge ${statusClass}">${data.status}</span></h2>
                    <div class="balance-section">
                        <div class="balance-value">${data.points.toLocaleString()}</div>
                        <div class="balance-label">Current Session Points</div>
                    </div>
                    <div class="actions-section">
                        <p style="font-size: 11px; color: #888;">Last Check: ${data.last_check || 'N/A'}</p>
                        <p style="font-size: 11px; color: #888;">Failures: ${data.failures}</p>
                        <button class="btn" onclick="alert('Configuration managed via encrypted database')">Manage Credentials</button>
                    </div>
                </div>
            `;
        }

    } catch (e) {
        console.error('Update failed', e);
    }
}

updateDashboard();
setInterval(updateDashboard, 10000);
</script>
</body>
</html>
