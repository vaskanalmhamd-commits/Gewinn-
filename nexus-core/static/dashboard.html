<!DOCTYPE html>
<html>
<head>
<title>Gewinn Unified Dashboard</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .balance-box { text-align: center; padding: 20px; background: #eef2f3; border-radius: 10px; flex: 1; margin: 0 10px; }
    .balance-value { font-size: 28px; font-weight: bold; color: #2c3e50; }
    .balance-label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; margin-top: 5px; }
    .status-online { color: #27ae60; font-weight: bold; }
    .btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 40px; border-radius: 15px; width: 400px; text-align: center; }
    .chat-box { height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 6px; background: #fafafa; }
    .chat-msg { margin-bottom: 8px; font-size: 14px; }
    .msg-user { color: #3498db; font-weight: bold; }
    .msg-agent { color: #2c3e50; }
</style>
</head>
<body>

<div id="lockModal" class="modal" style="display:none">
    <div class="modal-content">
        <h2>🔐 Vault Locked</h2>
        <p>Enter Master Password to view real-world earnings.</p>
        <input type="password" id="masterPass" placeholder="Master Password" style="width:100%; padding:12px; margin-bottom:15px; border-radius:6px; border:1px solid #ddd;">
        <button class="btn" onclick="unlockVault()" style="width:100%">Unlock Environment</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>📊 Unified Earning Center</h1>
        <button class="btn" onclick="openConnect()" style="background:#2ecc71">+ Connect Account</button>
    </div>

    <div style="display:flex; margin: 0 -10px 20px -10px;">
        <div class="balance-box">
            <div class="balance-value" id="totalUsd">$0.00</div>
            <div class="balance-label">Total Verified Balance</div>
        </div>
        <div class="balance-box">
            <div class="balance-value" id="hgCredits">0</div>
            <div class="balance-label">Honeygain Credits</div>
        </div>
    </div>

    <div class="card">
        <h2>🤖 Ask the Intelligent Agent</h2>
        <div class="chat-box" id="chatBox">
            <div class="chat-msg msg-agent">Ready. Ask me about your balance or threshold.</div>
        </div>
        <div style="display:flex; gap:10px">
            <input type="text" id="chatInput" placeholder="e.g. What is my balance?" style="flex:1; padding:10px; border-radius:6px; border:1px solid #ddd;">
            <button class="btn" onclick="sendChat()">Send</button>
        </div>
    </div>

    <div class="card">
        <h2>🔗 Connected Platforms</h2>
        <div id="platformList">
            <p style="color:#999">No accounts connected yet.</p>
        </div>
    </div>
</div>

<script>
async function refreshData() {
    const res = await fetch('/api/security/status');
    const status = await res.json();
    if (!status.unlocked) {
        document.getElementById('lockModal').style.display = 'flex';
        return;
    }
    document.getElementById('lockModal').style.display = 'none';

    const sumRes = await fetch('/api/dashboard/summary');
    const data = await sumRes.json();

    const hg = data.cache.find(c => c.platform === 'honeygain');
    if (hg) {
        document.getElementById('totalUsd').textContent = `$${hg.balance_usd.toFixed(2)}`;
        document.getElementById('hgCredits').textContent = hg.credits.toLocaleString();
        document.getElementById('platformList').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #eee">
                <strong>Honeygain</strong>
                <span class="status-online">● Connected</span>
            </div>
        `;
    }
}

async function unlockVault() {
    const pass = document.getElementById('masterPass').value;
    const res = await fetch('/api/security/unlock', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: pass})
    });
    if (res.ok) refreshData();
    else alert("Invalid password");
}

function openConnect() {
    const email = prompt("Honeygain Email:");
    const password = prompt("Honeygain Password:");
    if (email && password) {
        fetch('/api/accounts/connect', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({platform: 'honeygain', data: {email, password}})
        }).then(() => refreshData());
    }
}

async function sendChat() {
    const input = document.getElementById('chatInput');
    const box = document.getElementById('chatBox');
    const prompt = input.value;
    if (!prompt) return;

    box.innerHTML += `<div class="chat-msg"><span class="msg-user">You:</span> ${prompt}</div>`;
    input.value = '';

    const res = await fetch('/api/agent/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt})
    });
    const data = await res.json();
    box.innerHTML += `<div class="chat-msg"><span class="msg-agent">Agent:</span> ${data.answer}</div>`;
    box.scrollTop = box.scrollHeight;
}

setInterval(refreshData, 30000);
refreshData();
</script>
</body>
</html>
