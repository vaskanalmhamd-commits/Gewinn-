<!DOCTYPE html>
<html>
<head>
<title>Withdrawal - Gewinn Reality Engine</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f0f2f5; }
    .nav-bar { background-color: #1c1e21; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .nav-bar a { color: #fff; text-decoration: none; font-weight: bold; margin-right: 20px; }
    .container { background: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1, h2 { color: #333; margin-top: 0; }
    .balance-display { font-size: 32px; font-weight: bold; color: #28a745; margin-bottom: 20px; }
    form { display: grid; gap: 15px; max-width: 600px; }
    label { font-weight: bold; color: #555; }
    input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box; }
    .btn { padding: 12px 25px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
    .btn:hover { background-color: #0056b3; }
    .btn:disabled { background-color: #ccc; cursor: not-allowed; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    .status-completed { background-color: #e6f4ea; color: #1e8e3e; }
    .status-pending { background-color: #fff4e5; color: #b76e00; }
    .status-failed { background-color: #fce8e6; color: #d93025; }
    .history-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .history-table th, .history-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    .history-table th { background-color: #f8f9fa; color: #666; font-size: 13px; text-transform: uppercase; }
</style>
</head>
<body>

<div class="nav-bar">
    <div class="brand"><a href="/">🎯 Gewinn Reality Engine</a></div>
    <div class="links">
        <a href="/dashboard">Dashboard</a>
        <a href="/withdraw">Withdrawal</a>
    </div>
</div>

<div class="container">
    <h1>💰 Real-World Payout (Helio Gateway)</h1>
    <div class="balance-display" id="balanceDisplay">$0.0000</div>

    <form id="withdrawalForm">
        <div>
            <label for="amount">Amount (USD):</label>
            <input type="number" id="amount" step="0.0001" min="0.0001" required placeholder="0.0000">
        </div>
        <div>
            <label for="asset">Asset / Network:</label>
            <select id="asset" required>
                <option value="USDC">USDC (Solana)</option>
                <option value="USDT">USDT (Ethereum/BEP20)</option>
                <option value="SOL">Solana (SOL)</option>
            </select>
        </div>
        <div>
            <label for="address">Recipient Wallet Address:</label>
            <input type="text" id="address" required placeholder="Paste your wallet address here">
        </div>
        <button type="submit" class="btn" id="withdrawButton">Queue Payout Request</button>
    </form>
    <p id="statusMsg" style="margin-top: 15px; font-weight: bold;"></p>
</div>

<div class="container">
    <h2>Withdrawal History & Task Status</h2>
    <table class="history-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Asset</th>
                <th>Address</th>
                <th>Status</th>
                <th>TX Hash</th>
            </tr>
        </thead>
        <tbody id="historyBody">
            <!-- Dynamic rows -->
        </tbody>
    </table>
</div>

<script>
async function loadData() {
    try {
        const balRes = await fetch('/api/wallet/balance');
        const balData = await balRes.json();
        document.getElementById('balanceDisplay').textContent = `$${balData.balance.toFixed(4)}`;

        const histRes = await fetch('/api/withdraw/history');
        const histData = await histRes.json();
        const body = document.getElementById('historyBody');
        body.innerHTML = '';
        
        histData.withdrawals.forEach(w => {
            const statusClass = `status-${w.status.toLowerCase()}`;
            body.innerHTML += `
                <tr>
                    <td>${new Date(w.timestamp).toLocaleString()}</td>
                    <td>$${w.amount.toFixed(4)}</td>
                    <td>${w.asset}</td>
                    <td title="${w.address}">${w.address.substring(0,6)}...${w.address.substring(w.address.length-4)}</td>
                    <td><span class="status-badge ${statusClass}">${w.status}</span></td>
                    <td>${w.tx_hash ? `<a href="#" onclick="alert('${w.tx_hash}')">View Hash</a>` : 'N/A'}</td>
                </tr>
            `;
        });
    } catch (e) { console.error(e); }
}

document.getElementById('withdrawalForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('withdrawButton');
    const msg = document.getElementById('statusMsg');
    
    btn.disabled = true;
    msg.textContent = "🚀 Enqueueing request...";
    
    const payload = {
        amount: parseFloat(document.getElementById('amount').value),
        asset: document.getElementById('asset').value,
        address: document.getElementById('address').value
    };
    
    try {
        const res = await fetch('/api/withdraw', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const result = await res.json();
        msg.textContent = result.message || result.error;
        if(res.ok) document.getElementById('withdrawalForm').reset();
    } catch (e) {
        msg.textContent = "Error: " + e.message;
    } finally {
        btn.disabled = false;
        loadData();
    }
});

loadData();
setInterval(loadData, 10000);
</script>
</body>
</html>
